<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AOZORA 決裁システム</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Meiryo", "Hiragino Kaku Gothic ProN", "MS PGothic", sans-serif;
    background: #e9edf2;
    color: #222;
    font-size: 13px;
  }
  /* ---- システムヘッダー ---- */
  .sys-header {
    background: #1a3a6b;
    color: #fff;
    display: flex; align-items: center; gap: 14px;
    padding: 0 18px; height: 46px;
  }
  .sys-header .logo { font-weight: bold; font-size: 15px; letter-spacing: .06em; }
  .sys-header .logo span { color: #8fb3e8; font-size: 11px; margin-left: 8px; }
  .sys-header .user { margin-left: auto; font-size: 12px; color: #cdd9ec; }
  .sys-nav {
    background: #2c4f87; color: #cdd9ec;
    display: flex; gap: 2px; padding: 0 12px; font-size: 12px;
  }
  .sys-nav span { padding: 7px 14px; }
  .sys-nav span.on { background: #e9edf2; color: #1a3a6b; font-weight: bold; }

  main { max-width: 1080px; margin: 0 auto; padding: 16px 18px 60px; }

  .flash {
    background: #fff8dc; border: 1px solid #d8b94d; color: #6b5510;
    padding: 8px 14px; font-size: 12px; margin-bottom: 12px; display: none;
  }

  .panel-title {
    display: flex; align-items: center; gap: 10px;
    background: #d7dfe9; border: 1px solid #b3c1d4; border-bottom: none;
    padding: 7px 12px; font-weight: bold; color: #1a3a6b; font-size: 13px;
  }
  .panel-title .cnt { font-weight: normal; font-size: 12px; color: #555; }
  .panel-title button { margin-left: auto; }

  button {
    font: inherit; font-size: 12px;
    border: 1px solid #8fa3bd; border-radius: 3px;
    background: linear-gradient(#fdfdfd, #e4e9f0);
    color: #1a3a6b; padding: 4px 12px; cursor: pointer;
  }
  button:hover { background: #eef2f7; }
  button.approve { background: #1a6b3a; border-color: #1a6b3a; color: #fff; }
  button.approve:hover { background: #14552e; }
  button.reject { color: #a02020; border-color: #c08484; }

  table.list {
    border-collapse: collapse; width: 100%;
    background: #fff; border: 1px solid #b3c1d4;
    font-size: 12px;
  }
  .list th {
    background: #eef2f7; border: 1px solid #c8d2e0;
    padding: 6px 8px; color: #1a3a6b; white-space: nowrap;
  }
  .list td { border: 1px solid #d5dde8; padding: 6px 8px; vertical-align: top; }
  .list td.r { text-align: right; white-space: nowrap; }
  .list td.c { text-align: center; white-space: nowrap; }
  .list tr:nth-child(even) td { background: #f7f9fc; }

  .status {
    display: inline-block; padding: 1px 8px; border-radius: 3px;
    font-size: 11px; white-space: nowrap;
  }
  .status.wait { background: #fff3cd; border: 1px solid #d8b94d; color: #6b5510; }
  .status.progress { background: #d9e7fb; border: 1px solid #7ba0d4; color: #1a3a6b; }
  .status.done { background: #d9f2e2; border: 1px solid #5fa87c; color: #1a6b3a; }
  .status.reject { background: #f6dcdc; border: 1px solid #c08484; color: #a02020; }

  #emptyMsg {
    background: #fff; border: 1px solid #b3c1d4; border-top: none;
    padding: 40px; text-align: center; color: #777; font-size: 12px; line-height: 1.9;
  }

  /* ---- 稟議書ダイアログ ---- */
  dialog#detail {
    border: 2px solid #1a3a6b; border-radius: 0;
    width: min(860px, 95vw); max-height: 90vh;
    padding: 0; overflow-y: auto;
  }
  dialog#detail::backdrop { background: rgba(20,30,50,.55); }
  .ringi { padding: 26px 30px 30px; }
  .ringi-head { display: flex; align-items: flex-start; }
  .ringi-head h2 {
    flex: 1; text-align: center; margin: 0 0 4px;
    font-size: 20px; letter-spacing: .5em; color: #111;
  }
  .ringi-meta { font-size: 12px; text-align: right; color: #333; line-height: 1.9; white-space: nowrap; }
  .ringi-note { text-align: center; font-size: 11px; color: #777; margin-bottom: 14px; }

  /* 承認欄 */
  .approvals { display: flex; justify-content: flex-end; gap: 0; margin: 10px 0 16px; }
  .approval-box {
    width: 86px; border: 1px solid #333; border-left: none;
    text-align: center; font-size: 11px;
  }
  .approval-box:first-child { border-left: 1px solid #333; }
  .approval-box .role { border-bottom: 1px solid #333; background: #eef2f7; padding: 3px 0; }
  .approval-box .seal { height: 74px; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 2px; }
  .hanko {
    width: 44px; height: 44px; border: 2px solid #c0392b; border-radius: 50%;
    color: #c0392b; display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: bold; transform: rotate(-4deg);
  }
  .seal .when { font-size: 9px; color: #777; }

  table.form { border-collapse: collapse; width: 100%; background: #fff; font-size: 13px; }
  .form th {
    border: 1px solid #333; background: #eef2f7; color: #111;
    width: 10em; padding: 8px 10px; text-align: left; font-weight: bold;
    vertical-align: top; white-space: nowrap;
  }
  .form td { border: 1px solid #333; padding: 8px 10px; }
  .form td.amount { font-size: 15px; font-weight: bold; }

  details.raw { margin-top: 14px; font-size: 12px; }
  details.raw summary { cursor: pointer; color: #1a3a6b; }
  .raw table { border-collapse: collapse; width: 100%; margin-top: 6px; font-size: 12px; }
  .raw th, .raw td { border: 1px solid #c8d2e0; padding: 4px 8px; text-align: left; }
  .raw th { background: #eef2f7; width: 12em; font-weight: normal; color: #555; }

  .ringi-actions {
    display: flex; gap: 8px; justify-content: flex-end;
    margin-top: 18px; padding-top: 14px; border-top: 1px dashed #999;
  }
</style>
</head>
<body>
<div class="sys-header">
  <div class="logo">AOZORA 決裁システム<span>ver 9.2.1</span></div>
  <div class="user">ログイン中: 青田 宗一(総務部 総務課) | 前回ログイン 2026/07/09 17:42</div>
</div>
<div class="sys-nav">
  <span>ホーム</span><span class="on">契約決裁</span><span>経費精算</span><span>購買申請</span><span>各種届出</span><span>管理</span>
</div>

<main>
  <div class="flash" id="flash"></div>

  <div class="panel-title">
    契約決裁 &gt; 申請一覧
    <span class="cnt" id="count">0件</span>
    <button id="clearBtn">全件クリア(デモ用)</button>
  </div>
  <table class="list" id="listTable">
    <thead>
      <tr>
        <th>決裁番号</th><th>申請日</th><th>件名</th><th>相手先</th>
        <th>決裁金額(税込)</th><th>ステータス</th><th>操作</th>
      </tr>
    </thead>
    <tbody id="listBody"></tbody>
  </table>
  <div id="emptyMsg">
    申請はありません。<br>
    契約書アブストラクターの「転記」ボタンから契約データを送ると、ここに決裁申請として起票されます。
  </div>
</main>

<dialog id="detail">
  <div class="ringi" id="ringiBody"></div>
</dialog>

<script>
const KEY = "kessai_apps";
const ROUTE = ["申請", "課長", "部長", "経理部長"];
const SEALS = { "申請": "青田", "課長": "村瀬", "部長": "石田", "経理部長": "小林" };

function load() {
  try { return JSON.parse(localStorage.getItem(KEY) || "[]"); } catch { return []; }
}
function save(apps) { localStorage.setItem(KEY, JSON.stringify(apps)); }

function pad(n, w) { return String(n).padStart(w, "0"); }
function fmtDate(iso) {
  const d = new Date(iso);
  if (isNaN(d)) return "";
  return `${d.getFullYear()}/${pad(d.getMonth() + 1, 2)}/${pad(d.getDate(), 2)}`;
}
function yen(v) {
  if (v === null || v === undefined || v === "") return "";
  const n = Number(String(v).replace(/[,、円\s]/g, ""));
  if (!isNaN(n) && String(v).match(/[0-9]/)) return n.toLocaleString("ja-JP") + " 円";
  return String(v);
}

// ---- 転記データ(アブストラクター形式)→ 決裁申請フォーマットへのマッピング ----
function mapPayload(p) {
  const fields = Array.isArray(p.fields) ? p.fields : [];
  const pick = (...keys) => {
    for (const k of keys) {
      const f = fields.find((x) => String(x.label || "").includes(k) && x.value !== null && x.value !== undefined && x.value !== "");
      if (f) return f.value;
    }
    return "";
  };
  const title = pick("契約書名", "件名", "契約名") || (p.filename || "").replace(/\.[^.]+$/, "") || "契約決裁申請";
  const start = pick("開始日");
  const end = pick("終了日");
  return {
    title: `${title} の締結について`,
    partner: pick("取引先", "相手先", "相手方", "会社名"),
    amount: pick("金額(税込)", "税込", "契約金額", "決裁金額", "金額"),
    period: start || end ? `${start || "—"} 〜 ${end || "—"}` : pick("契約期間", "期間"),
    payment: pick("支払条件", "支払サイト", "支払方法", "支払"),
    account: pick("勘定科目", "科目"),
    reason: pick("摘要", "要約", "概要") || "標記の件について、添付の契約書のとおり締結いたしたく、ご決裁を仰ぎます。",
    filename: p.filename || "",
    raw: fields,
  };
}

// ---- URLハッシュ(#data=...)で転記データを受け取り、決裁申請として起票 ----
(function receive() {
  if (!location.hash.startsWith("#data=")) return;
  try {
    const payload = JSON.parse(decodeURIComponent(location.hash.slice("#data=".length)));
    const m = mapPayload(payload);
    const apps = load();
    const seq = (Number(localStorage.getItem("kessai_seq") || "0") + 1);
    localStorage.setItem("kessai_seq", String(seq));
    const now = new Date();
    apps.push({
      no: `RS-${now.getFullYear()}-${pad(seq, 4)}`,
      applied_at: now.toISOString(),
      status: "承認待ち",
      approved: 1, // 申請者の押印まで完了
      ...m,
    });
    save(apps);
    sessionStorage.setItem("kessai_flash", "契約書アブストラクターからの転記データを受け付け、決裁申請を起票しました。");
  } catch (e) {
    sessionStorage.setItem("kessai_flash", "転記データの読み取りに失敗しました。");
  }
  history.replaceState(null, "", location.pathname + location.search);
})();

function statusBadge(app) {
  const span = document.createElement("span");
  if (app.status === "却下") { span.className = "status reject"; span.textContent = "却下"; }
  else if (app.approved >= ROUTE.length) { span.className = "status done"; span.textContent = "決裁完了"; }
  else if (app.approved > 1) { span.className = "status progress"; span.textContent = `承認中(${ROUTE[app.approved - 1]}承認済)`; }
  else { span.className = "status wait"; span.textContent = "承認待ち"; }
  return span;
}

function render() {
  const apps = load();
  const body = document.getElementById("listBody");
  body.innerHTML = "";
  document.getElementById("count").textContent = apps.length + "件";
  document.getElementById("emptyMsg").style.display = apps.length ? "none" : "block";
  document.getElementById("listTable").style.display = apps.length ? "" : "none";

  apps.slice().reverse().forEach((app, ri) => {
    const idx = apps.length - 1 - ri;
    const tr = document.createElement("tr");
    const cells = [
      app.no,
      fmtDate(app.applied_at),
      app.title,
      app.partner || "—",
      yen(app.amount) || "—",
    ];
    cells.forEach((v, ci) => {
      const td = document.createElement("td");
      if (ci === 4) td.className = "r";
      if (ci === 0 || ci === 1) td.className = "c";
      td.textContent = v;
      tr.appendChild(td);
    });
    const tdStatus = document.createElement("td");
    tdStatus.className = "c";
    tdStatus.appendChild(statusBadge(app));
    tr.appendChild(tdStatus);

    const tdOp = document.createElement("td");
    tdOp.className = "c";
    const openBtn = document.createElement("button");
    openBtn.textContent = "詳細";
    openBtn.addEventListener("click", () => openDetail(idx));
    const delBtn = document.createElement("button");
    delBtn.textContent = "削除";
    delBtn.style.marginLeft = "4px";
    delBtn.addEventListener("click", () => {
      if (!confirm(`${app.no} を削除しますか?`)) return;
      apps.splice(idx, 1);
      save(apps);
      render();
    });
    tdOp.append(openBtn, delBtn);
    tr.appendChild(tdOp);
    body.appendChild(tr);
  });
}

const detail = document.getElementById("detail");
detail.addEventListener("click", (e) => { if (e.target === detail) detail.close(); });

function openDetail(idx) {
  const apps = load();
  const app = apps[idx];
  if (!app) return;
  const box = document.getElementById("ringiBody");
  box.innerHTML = "";

  const head = document.createElement("div");
  head.className = "ringi-head";
  head.innerHTML = `<h2>稟議書</h2><div class="ringi-meta">決裁番号: ${app.no}<br>申請日: ${fmtDate(app.applied_at)}</div>`;
  box.appendChild(head);
  const note = document.createElement("div");
  note.className = "ringi-note";
  note.textContent = "(契約書アブストラクターからの転記により自動起票)";
  box.appendChild(note);

  // 承認欄
  const appr = document.createElement("div");
  appr.className = "approvals";
  ROUTE.forEach((role, i) => {
    const b = document.createElement("div");
    b.className = "approval-box";
    const sealed = app.status !== "却下" && i < app.approved;
    b.innerHTML = `<div class="role">${role}</div>
      <div class="seal">${sealed ? `<div class="hanko">${SEALS[role]}</div><div class="when">${fmtDate(app.applied_at)}</div>` : ""}</div>`;
    appr.appendChild(b);
  });
  box.appendChild(appr);

  // 稟議書本体(決裁システム独自のフォーマット)
  const form = document.createElement("table");
  form.className = "form";
  const rows = [
    ["件名", app.title],
    ["申請者", "総務部 総務課 青田 宗一(内線 2103)"],
    ["相手先", app.partner || "—"],
    ["決裁金額(税込)", { html: `<span class="amount">${yen(app.amount) || "—"}</span>`, cls: "amount" }],
    ["契約期間", app.period || "—"],
    ["支払条件", app.payment || "—"],
    ["経理処理(勘定科目)", app.account || "—"],
    ["申請理由", app.reason || "—"],
    ["添付書類", app.filename ? `契約書ドラフト: ${app.filename}(1通)` : "—"],
  ];
  rows.forEach(([label, val]) => {
    const tr = document.createElement("tr");
    const th = document.createElement("th");
    th.textContent = label;
    const td = document.createElement("td");
    if (val && typeof val === "object") { td.innerHTML = val.html; td.className = val.cls; }
    else td.textContent = val;
    tr.append(th, td);
    form.appendChild(tr);
  });
  box.appendChild(form);

  // 参考: 転記された元データ(フォーマットが異なるためそのまま格納)
  if (app.raw && app.raw.length) {
    const det = document.createElement("details");
    det.className = "raw";
    const sum = document.createElement("summary");
    sum.textContent = `参考: 契約書アブストラクターからの転記データ(${app.raw.length}項目)`;
    det.appendChild(sum);
    const t = document.createElement("table");
    app.raw.forEach((f) => {
      const tr = document.createElement("tr");
      const th = document.createElement("th");
      th.textContent = f.label;
      const td = document.createElement("td");
      td.textContent = f.value === null || f.value === undefined ? "" :
        (typeof f.value === "number" ? f.value.toLocaleString("ja-JP") : f.value);
      tr.append(th, td);
      t.appendChild(tr);
    });
    det.appendChild(t);
    box.appendChild(det);
  }

  // 操作
  const actions = document.createElement("div");
  actions.className = "ringi-actions";
  if (app.status !== "却下" && app.approved < ROUTE.length) {
    const approveBtn = document.createElement("button");
    approveBtn.className = "approve";
    approveBtn.textContent = `承認する(${ROUTE[app.approved]})`;
    approveBtn.addEventListener("click", () => {
      app.approved += 1;
      if (app.approved >= ROUTE.length) app.status = "決裁完了";
      save(apps);
      render();
      openDetail(idx);
    });
    const rejectBtn = document.createElement("button");
    rejectBtn.className = "reject";
    rejectBtn.textContent = "却下";
    rejectBtn.addEventListener("click", () => {
      app.status = "却下";
      save(apps);
      render();
      openDetail(idx);
    });
    actions.append(approveBtn, rejectBtn);
  }
  const closeBtn = document.createElement("button");
  closeBtn.textContent = "閉じる";
  closeBtn.addEventListener("click", () => detail.close());
  actions.appendChild(closeBtn);
  box.appendChild(actions);

  if (!detail.open) detail.showModal();
}

document.getElementById("clearBtn").addEventListener("click", () => {
  const apps = load();
  if (apps.length && confirm("すべての申請を削除しますか?(デモ用のリセット)")) {
    localStorage.removeItem(KEY);
    localStorage.removeItem("kessai_seq");
    render();
  }
});

// 転記直後のメッセージ + 最新の申請を自動で開く
const flashMsg = sessionStorage.getItem("kessai_flash");
if (flashMsg) {
  const flash = document.getElementById("flash");
  flash.textContent = "【お知らせ】 " + flashMsg;
  flash.style.display = "block";
  sessionStorage.removeItem("kessai_flash");
  const apps = load();
  if (apps.length && flashMsg.includes("起票")) {
    setTimeout(() => openDetail(apps.length - 1), 300);
  }
}

render();
</script>
</body>
</html>
